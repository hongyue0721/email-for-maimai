<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body style="margin:0;padding:0;background:#fffbe6;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;">
  <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background:#fffbe6;padding:24px 0;">
    <tr>
      <td align="center">
        <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="max-width:600px;background:#ffffff;border-radius:16px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,0.05);">
          <tr>
            <td style="background:linear-gradient(135deg,#ffb86b 0%,#ffd89b 100%);padding:28px 32px;">
              <h2 style="margin:0;color:#5a3b00;font-size:22px;font-weight:600;">
                {{ greeting_word }}，{{ nickname }}~
              </h2>
            </td>
          </tr>
          <tr>
            <td style="padding:28px 32px 8px 32px;">
              <div style="color:#3d3d3d;font-size:15px;line-height:1.85;white-space:pre-wrap;">
                {{ content }}
              </div>
            </td>
          </tr>
          <tr>
            <td style="padding:8px 32px 28px 32px;">
              <hr style="border:none;border-top:1px dashed #e2e2e2;margin:16px 0;">
              <p style="margin:0;color:#9a9a9a;font-size:12px;line-height:1.6;">
                —— {{ sender_name }}<br>
                {{ send_time }}
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
