# 麦麦邮件插件配置示例
# 复制为 config.toml 后按需修改。
# ⚠️ config.toml 含 SMTP 授权码等敏感信息，已在 .gitignore 中排除，切勿提交。

[plugin]
enabled = true
config_version = "0.1.0"

[smtp]
# 预设：brevo / qq / 163 / gmail / outlook / custom
preset = "brevo"
host = "smtp-relay.brevo.com"
port = 587
# none / starttls / ssl
security = "starttls"
username = "your-smtp-login@example.com"
password = "your-smtp-password-or-api-key"
sender_name = "鸿小岳"
# 对 Brevo 等中继：必须填已验证发件人邮箱，不是 SMTP 登录名
sender_email = "noreply@your-domain.com"
timeout = 30

[schedule]
# 扫描间隔（秒）= 调度精度；默认 1 小时
scan_interval = 3600
# Worker 并发 1-3，默认 2
max_workers = 2
timezone = "Asia/Shanghai"
startup_grace_seconds = 15

[format]
# html / plain
type = "html"
# 模板名：default / greeting / miss，或 data_dir/templates 下自定义名
template = "default"

[llm]
# 关键：必须填 MaiBot model_task_config 里的文本生成任务名
# 例如 utils / replyer。留空在部分 Host 上会落到 alphabetically-first 的 embedding 任务
model = "utils"
temperature = 0.8
max_tokens = 500
# 是否注入 bot_config.toml 的 personality
inject_persona = true
persona_max_chars = 1200

[context]
recent_window_days = 5
message_limit = 30
global_search_limit = 200

[memory]
enabled = true
limit = 5
query_template = "{nickname} 最近关心的事"
respect_filter = true

[safety]
per_user_daily_limit = 3
min_interval_minutes = 60
content_dedup_window_days = 2

[retry]
max_retries = 3
backoff_base = 60
dead_letter_threshold = 3

[admin]
# 管理员 QQ 号列表；/查邮箱 仅管理员可用
admin_qq_list = ["123456789"]

[prompt]
# 可追加到各 intent system prompt 的额外说明（可留空）
greeting_system_extra = ""
miss_system_extra = ""
blessing_system_extra = ""
chat_system_extra = ""
user_suffix = ""
